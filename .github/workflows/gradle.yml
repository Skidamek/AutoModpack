name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never
      - name: Check formatting
        run: ./gradlew formatCheck

  core-tests:
    name: Core tests
    uses: ./.github/workflows/tests.yml

  autotester-tests:
    name: Autotester tests
    uses: ./.github/workflows/autotester-tests.yml

  build:
    name: Build and package
    uses: ./.github/workflows/build.yml
    with:
      source_sha: ${{ github.sha }}
      artifact_retention_days: 7

  gate:
    name: CI Gate
    needs: [format, core-tests, autotester-tests, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          jq -r 'to_entries[] | "\(.key): \(.value.result)"' <<<"$NEEDS"
          jq -e 'all(.[]; .result == "success")' <<<"$NEEDS"
