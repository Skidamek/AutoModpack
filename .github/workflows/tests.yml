name: step.tests

on: [workflow_call]

permissions:
  contents: read

jobs:
  tests:
    name: Windows core tests
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never
          cache-disabled: 'true'
      - name: Run tests
        run: ./gradlew core:test
