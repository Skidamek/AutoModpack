name: In-game Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Autotest scenario; blank uses the autotester default
        default: ''
      target:
        description: Target ID; blank uses the autotester default
        default: ''

permissions:
  contents: read

concurrency:
  group: ingame-${{ github.ref }}-${{ inputs.scenario }}-${{ inputs.target }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Select targets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
      - name: Generate target matrix
        id: matrix
        env:
          SCENARIO: ${{ inputs.scenario }}
          TARGET: ${{ inputs.target }}
        run: |
          targets=$(uv --project autotester run autotester targets --scenario "$SCENARIO" --target "$TARGET")
          echo "matrix={\"target\":$targets}" >> "$GITHUB_OUTPUT"

  unit:
    name: Autotester tests
    uses: ./.github/workflows/autotester-tests.yml

  client-image:
    name: Build client image
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
      - name: Build autotest client image
        run: uv --project autotester run autotester build-images
      - name: Export autotest client image
        run: docker save automodpack-autotest-client:local | zstd -T0 -3 -o /tmp/automodpack-autotest-client.tar.zst
      - name: Upload client image
        uses: actions/upload-artifact@v7
        with:
          name: ingame-client-image
          path: /tmp/automodpack-autotest-client.tar.zst
          compression-level: 0
          retention-days: 1

  ingame:
    name: Test ${{ matrix.target }}
    needs: [prepare, client-image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never
          cache-provider: basic
      - name: Build instrumented target
        env:
          TARGET: ${{ matrix.target }}
        run: ./gradlew ":$TARGET:build" -Pautomodpack.autotest
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
      - name: Download client image
        uses: actions/download-artifact@v8
        with:
          name: ingame-client-image
          path: /tmp/ingame-client-image
      - name: Load autotest client image
        run: zstd -d -c /tmp/ingame-client-image/automodpack-autotest-client.tar.zst | docker load
      - name: Run autotest
        env:
          SCENARIO: ${{ inputs.scenario }}
          TARGET: ${{ matrix.target }}
        run: uv --project autotester run autotester run --target "$TARGET" --scenario "$SCENARIO"
      - name: Upload target results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ingame-results-${{ matrix.target }}
          path: autotester/out
          if-no-files-found: warn
          retention-days: 7

  report:
    name: Aggregate results
    needs: [prepare, ingame]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Download target results
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: ingame-results-*
          path: results
      - name: Aggregate results
        id: aggregate
        env:
          EXPECTED_MATRIX: ${{ needs.prepare.outputs.matrix }}
          PYTHONPATH: autotester
        run: python3 -m automodpack_autotester.report --results-dir results
      - name: Upload summary
        uses: actions/upload-artifact@v7
        with:
          name: ingame-results-summary
          path: |
            aggregated.json
            summary.md
          retention-days: 14
      - name: Post job summary
        run: cat summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Check overall result
        if: steps.aggregate.outputs.ok != 'true'
        run: |
          echo "Some tests failed"
          exit 1
