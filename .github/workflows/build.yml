name: step.build

on:
  workflow_call:
    inputs:
      targets:
        description: Comma-separated Stonecutter targets; empty builds all targets
        type: string
        required: false
        default: ''
      autotest:
        description: Bundle autotester instrumentation into the jars
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never
          cache-provider: basic
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Generate build matrix
        id: matrix
        env:
          TARGETS: ${{ inputs.targets }}
        run: |
          args=(writeReleaseMatrix)
          if [[ -n "$TARGETS" ]]; then
            args+=("-Pautomodpack.targets=$TARGETS")
          fi
          ./gradlew "${args[@]}"
          echo "matrix=$(<build/ci/release-matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never
          cache-provider: basic
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Build target
        env:
          TARGET: ${{ matrix.subproject }}
          AUTOTEST: ${{ inputs.autotest }}
        run: |
          args=(buildTargets "-Pautomodpack.targets=$TARGET")
          if [[ "$AUTOTEST" == true ]]; then
            args+=("-Pautomodpack.autotest")
          fi
          ./gradlew "${args[@]}"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.file }}
          path: merged/${{ matrix.file }}
          if-no-files-found: error
