name: step.build

on:
  workflow_call:
    inputs:
      targets:
        description: Comma-separated Stonecutter targets; empty builds all targets
        type: string
        required: false
        default: ''
      autotest:
        description: Bundle autotester instrumentation into the jars
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Build targets
        env:
          TARGETS: ${{ inputs.targets }}
          AUTOTEST: ${{ inputs.autotest }}
        run: |
          args=(buildTargets)
          if [[ -n "$TARGETS" ]]; then
            args+=("-Pautomodpack.targets=$TARGETS")
          fi
          if [[ "$AUTOTEST" == true ]]; then
            args+=("-Pautomodpack.autotest")
          fi
          ./gradlew "${args[@]}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: merged/*.jar
          if-no-files-found: error
