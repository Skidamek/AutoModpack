name: Release

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('Manual release for {0}{1}', inputs.target_release_tag, inputs.target_subproject && format(' ({0})', inputs.target_subproject) || '')
      || github.event.release.name }}

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target_subproject:
        description: Comma-separated targets to publish; empty publishes all
        type: string
        required: false
        default: ''
      target_release_tag:
        description: Existing GitHub release tag to publish to
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.target_release_tag || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release and source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      changelog: ${{ steps.release.outputs.changelog }}
      source_branch: ${{ steps.release.outputs.source_branch }}
      source_sha: ${{ steps.release.outputs.source_sha }}
    steps:
      - name: Resolve destination release and current main
        id: release
        uses: actions/github-script@v9
        env:
          TARGET_RELEASE_TAG: ${{ inputs.target_release_tag }}
        with:
          script: |
            const releaseRequest = context.eventName === 'release'
              ? Promise.resolve(context.payload.release)
              : github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: process.env.TARGET_RELEASE_TAG,
                }).then(({ data }) => data);
            const [release, repositoryResponse] = await Promise.all([
              releaseRequest,
              github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
              }),
            ]);
            const repository = repositoryResponse.data;
            const branch = (await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: repository.default_branch,
            })).data;
            core.setOutput('tag', release.tag_name);
            core.setOutput('changelog', release.body || '');
            core.setOutput('source_branch', repository.default_branch);
            core.setOutput('source_sha', branch.commit.sha);
      - name: Summarize release
        env:
          SOURCE_BRANCH: ${{ steps.release.outputs.source_branch }}
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
          TAG: ${{ steps.release.outputs.tag }}
          TARGETS: ${{ inputs.target_subproject || 'all' }}
        run: |
          {
            echo '## Release parameters'
            echo "- Destination tag: \`$TAG\`"
            echo "- Source: \`$SOURCE_BRANCH\` at \`$SOURCE_SHA\`"
            echo "- Publish targets: \`$TARGETS\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build current main
    needs: prepare
    uses: ./.github/workflows/build.yml
    with:
      source_sha: ${{ needs.prepare.outputs.source_sha }}
      targets: ${{ inputs.target_subproject }}
      artifact_retention_days: 7

  verify:
    name: Verify release version
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Match build version to destination tag
        env:
          MATRIX: ${{ needs.build.outputs.matrix }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          version=$(jq -r '.include[0].mod_version' <<<"$MATRIX")
          [[ "$version" != null && -n "$version" ]] || { echo "Build matrix has no version" >&2; exit 1; }
          tag_version=${TAG#v}
          [[ "$version" == "$tag_version" ]] || {
            echo "Build version $version does not match destination tag $TAG" >&2
            exit 1
          }

  publish:
    name: Publish ${{ matrix.subproject }}
    needs: [prepare, build, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build.outputs.matrix) }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.file }}
          path: build-artifacts
      - name: Verify artifact
        env:
          FILE: build-artifacts/${{ matrix.file }}
        run: test -f "$FILE"
      - name: Publish Minecraft mod
        uses: Kir-Antipov/mc-publish@52307b03863581dec6b652b83e597aec02ebb075 # v3.3.1
        with:
          modrinth-id: k68glP2e
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          curseforge-id: 639211
          curseforge-token: ${{ secrets.CF_API_TOKEN }}
          github-tag: ${{ needs.prepare.outputs.tag }}
          github-token: ${{ github.token }}

          files: build-artifacts/${{ matrix.file }}
          name: ${{ format('{0} {1} {2}', matrix.mod_name, matrix.mod_version, matrix.loader) }}
          version: ${{ matrix.mod_version }}
          version-type: release
          loaders: ${{ matrix.loader }}
          game-versions: ${{ matrix.publish_versions }}
          game-version-filter: any
          dependencies: ''

          github-changelog: ${{ needs.prepare.outputs.changelog }}
          modrinth-changelog: ${{ needs.prepare.outputs.changelog }}
          curseforge-changelog: ${{ needs.prepare.outputs.changelog }}
          retry-attempts: 3
          retry-delay: 10000
