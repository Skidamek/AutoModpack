name: Release

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('Manual release for {0}{1}', inputs.target_release_tag, inputs.target_subproject && format(' ({0})', inputs.target_subproject) || '')
      || github.event.release.name }}

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target_subproject:
        description: Comma-separated Stonecutter targets; empty publishes all targets
        type: string
        required: false
        default: ''
      target_release_tag:
        description: Existing GitHub release tag to publish to
        type: string
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      tag: ${{ steps.release.outputs.tag }}
      changelog: ${{ steps.release.outputs.changelog }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never
      - name: Generate release matrix
        id: matrix
        env:
          TARGETS: ${{ inputs.target_subproject }}
        run: |
          args=(writeReleaseMatrix)
          if [[ -n "$TARGETS" ]]; then
            args+=("-Pautomodpack.targets=$TARGETS")
          fi
          ./gradlew "${args[@]}"
          echo "matrix=$(<build/ci/release-matrix.json)" >> "$GITHUB_OUTPUT"
      - name: Read release information
        id: release
        uses: actions/github-script@v9
        env:
          TARGET_RELEASE_TAG: ${{ inputs.target_release_tag }}
        with:
          script: |
            const release = context.eventName === 'release'
              ? context.payload.release
              : (await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: process.env.TARGET_RELEASE_TAG,
                })).data;
            core.setOutput('tag', release.tag_name);
            core.setOutput('changelog', release.body || '');
      - name: Summarize release
        env:
          TARGETS: ${{ inputs.target_subproject || 'all' }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          {
            echo '## Release parameters'
            echo "- Tag: \`$TAG\`"
            echo "- Targets: \`$TARGETS\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      targets: ${{ inputs.target_subproject }}

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.file }}
          path: build-artifacts
      - name: Verify artifact
        env:
          FILE: build-artifacts/${{ matrix.file }}
        run: test -f "$FILE"
      - name: Publish Minecraft mod
        uses: Kir-Antipov/mc-publish@v3.3.1
        with:
          modrinth-id: k68glP2e
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          curseforge-id: 639211
          curseforge-token: ${{ secrets.CF_API_TOKEN }}
          github-tag: ${{ needs.prepare.outputs.tag }}
          github-token: ${{ github.token }}

          files: build-artifacts/${{ matrix.file }}
          name: ${{ format('{0} {1} {2}', matrix.mod_name, matrix.mod_version, matrix.loader) }}
          version: ${{ matrix.mod_version }}
          version-type: release
          loaders: ${{ matrix.loader }}
          game-versions: ${{ matrix.publish_versions }}
          game-version-filter: any
          dependencies: ''

          github-changelog: ${{ needs.prepare.outputs.changelog }}
          modrinth-changelog: ${{ needs.prepare.outputs.changelog }}
          curseforge-changelog: ${{ needs.prepare.outputs.changelog }}
          retry-attempts: 3
          retry-delay: 10000
