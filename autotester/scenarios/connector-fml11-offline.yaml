id: connector-fml11-offline
description: |
  NeoForge 26.1.2 proof that current Sinytra Connector and its FML11 services load
  in place from AutoModpack's selected modpack directory, then discover, initialize,
  and mix in a genuinely Fabric-only downstream mod from that directory. The fixture
  has no NeoForge metadata and deliberately lacks Launchpad's compatibility opt-in,
  so Launchpad cannot make this test pass in Connector's place. Nothing is copied to
  standard mods/ and no restart, filename-order trick, or timing sleep is used.

network: host
mode: client-only

timeouts:
  clientRunSeconds: 1200

targets:
  - 26.1-neoforge

flow:
  - do: stage_modpack
    name: stage a Fabric-only fixture and current Connector dependencies
    mods:
      - merged/autotest-fixtures/connector-downstream-26.1.jar
      - url: https://cdn.modrinth.com/data/u58R1TMW/versions/E1SvcIi5/connector-3.0.0-beta.3%2B26.1.2-full.jar
        sha512: 5ac8d51761db794ae3125895a22824961fe3611e544a82749a3d5c6f3ee40c1257652652f77d00f00870134a97cc81d51f0471b72e301d0caf2e828af3c59a58
      - url: https://cdn.modrinth.com/data/voWgQoWV/versions/nWdOZVsP/launchpad-1.8.0%2B26.1.2-full.jar
        sha512: a863fc9e8b229c2f2d952c6ccacd3db7afe20654fff3335b4a6d23cc78dbd625121dd0c3ac61199d6027bdc4d06dde6473b52094676d2356914e6d191f2faf75
      - url: https://cdn.modrinth.com/data/Aqlf1Shp/versions/rG5Z7yD5/forgified-fabric-api-0.155.0%2B26.1.2%2B3.4.2.jar
        sha512: f226f179b767a590453502c61a155363429b4f90fe43ba1d3401e130080784f739b2d7a61fddc205afa346875d2be90119ad3d78205e688981f53796b69a9fe1
      - url: https://cdn.modrinth.com/data/FYpiwiBR/versions/X0aO2A0t/ConnectorExtras-2.0.0%2B26.1.2.jar
        sha512: f9076afe74dc474146997ceb82cde5ee9fdc49411201d8a003666321c5d5d784f7bb98782837ac6eb835d916031bc18887c238f16d7305658a952b50663151fc
  - do: launch_client
    name: boot NeoForge against the staged Connector modpack
  - do: wait_for
    name: Connector services ran and the Fabric fixture initialized
    timeout: 300s
    until:
      all:
        - log:
            container: client
            matches_all:
              - 'Bootstrapping \d+ early-service'
              - 'AUTOMODPACK_CONNECTOR_FIXTURE_INITIALIZED'
        - log:
            file: logs/debug.log
            matches_all:
              - 'org\.sinytra\.connector\.locator\.ConnectorModFileReader from .*connector-3\.0\.0'
              - 'org\.sinytra\.connector\.service\.ModuleLayerMigrator from .*connector-3\.0\.0'
              - 'org\.sinytra\.connector\.locator\.ConnectorLocator from .*connector-3\.0\.0'
              - 'org\.sinytra\.connector\.service\.coremod\.ConnectorClassProcessor'
  - do: assert
    name: Connector loaded the downstream Fabric mod cleanly and entirely in place
    that:
      all:
        - only_files:
            dir: mods
            patterns: ['automodpack.jar']
        - log:
            container: client
            not_matches:
              - 'Applying workaround'
              - 'Please restart the game to apply updates!'
              - 'Failed to (?:load|run|instantiate).*(?:Connector|ModuleLayerMigrator)'
              - 'ClassNotFoundException.*(?:connector|automodpack_connector_fixture)'
              - 'NoClassDefFoundError.*(?:connector|automodpack_connector_fixture)'
              - 'Mixin apply for mod automodpack_connector_fixture failed'
              - 'DuplicateModsFoundException'
        - log:
            file: logs/debug.log
            matches: 'Mixing ConnectorFixtureMixin from automodpack-connector-fixture\.mixins\.json into net\.minecraft\.client\.Minecraft'
  - use: finish_client_only

serverFiles:
  modpackName: amp-autotest
  marker: config/amp-autotest-marker.json
