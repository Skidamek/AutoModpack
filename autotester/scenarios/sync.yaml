id: sync
description: |
  Launch server/client, accept fingerprint, sync modpack, verify files, restart,
  rejoin, and verify the player reaches the game.

flow:
  - launch_server
  - launch_client
  - read_fingerprint
  - wait_server
  - wait_bridge
  - connect
  - wait_fingerprint
  - accept_fingerprint
  - wait_danger
  - click_confirm
  - wait_download
  - verify_files
  - click_restart
  - quit
  - launch_client
  - wait_bridge
  - connect
  - wait_join
  - quit

topology:
  server:
    memory: 2G
    env:
      ENABLE_ROLLING_LOGS: "false"
    modrinth:
      projects:
        - ferrite-core?
      dependencies: true

serverFiles:
  modpackName: amp-autotest
  marker: config/amp-autotest-marker.json
  files:
    - path: config/amp-autotest-alpha.txt
      content: "amp-autotest-alpha\n"
    - path: config/amp-autotest-beta.json
      content: '{"id":"beta","value":42}'
    - path: config/amp-autotest-gamma.cfg
      content: "alpha=true\nbeta=false\n"
