id: sync
description: |
  Full round trip: boot, trust the certificate, sync the modpack, verify the files,
  restart the client, rejoin, and confirm the player reaches the game with the
  modpack applied.

flow:
  - use: boot
  - use: accept_certificate
  - use: download_modpack
  - do: verify_files
    name: verify all synced files are present
  - do: assert
    name: standard mods/ dir holds only the AutoModpack loader jar (modpack mods stay in the modpack folder)
    that:
      only_files:
        dir: mods
        patterns: ["automodpack.jar"]
  - use: restart_client
  - use: rejoin
  - do: quit
    name: quit the client

topology:
  server:
    memory: 2G
    env:
      ENABLE_ROLLING_LOGS: "false"
    modrinth:
      projects:
        - ferrite-core?

serverFiles:
  modpackName: amp-autotest
  marker: config/amp-autotest-marker.json
  files:
    - path: config/amp-autotest-alpha.txt
      content: "amp-autotest-alpha\n"
    - path: config/amp-autotest-beta.json
      content: '{"id":"beta","value":42}'
    - path: config/amp-autotest-gamma.cfg
      content: "alpha=true\nbeta=false\n"
