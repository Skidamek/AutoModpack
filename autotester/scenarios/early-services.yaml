id: early-services
description: |
  Verify that neo/forge mods which ship "early services" (a GraphicsBootstrapper plus a
  mod locator) load straight from AutoModpack's modpack folder - their bootstrapper fires
  in place and their real (inner) mod loads - WITHOUT being copied into the standard mods/
  directory.

  Sodium is the canonical example: its thin outer jar normally lives on the loader's SERVICE
  layer (which AutoModpack's candidate locator never reaches) and holds classes the real
  inner mod references, so without the in-place bootstrap it crashed unless force-copied to
  mods/. AutoModpack fires its GraphicsBootstrapper from a child service layer and adds a
  stripped game-library copy of the outer jar to the GAME layer so the inner mod resolves
  those classes (and their bytecode resources, which Mixin reads) in place.

  Verification is log-based. Sodium drives real OpenGL (it creates GL fence objects), which
  the headless test container's software GL cannot satisfy, so the client may crash at the
  first rendered frame - AFTER the early service has run and the inner mod has loaded. That
  terminal state is expected here: the scenario asserts the service fired and the inner mod
  was located in place, not gameplay. On a GPU-capable host the same assertions hold and the
  client simply keeps running.

  (Ixeris is another such mod and its GraphicsBootstrapper fires in place the same way, but
  it rewrites org.lwjgl.glfw.GLFW via class redefinition, which hard-crashes the JVM on the
  container's stub LWJGL natives - so it is not exercised headlessly here.)

flow:
  - use: boot
  - use: accept_certificate
  - use: download_modpack
  - do: verify_mods
    name: sodium synced into the modpack folder
    timeout: 180s
  - use: restart_client
  # Relaunch with the modpack now on disk: AutoModpack's GraphicsBootstrapper runs during
  # the early-window phase and fires the modpack mod's early service in place.
  - do: launch_client
    name: relaunch the client with the modpack active
  # Wait for the in-place bootstrap to happen. This is a pure log check, so it succeeds
  # whether the client then crashes on headless GL or keeps running on a real GPU. A large
  # tail is required because these lines are emitted early, before any later log volume.
  - do: wait_for
    name: AutoModpack bootstrapped the early-service mod in place
    timeout: 240s
    until:
      log:
        container: client
        tail: 100000
        matches: 'AutoModpack\] Bootstrapping \d+ early-service'
  - do: assert
    name: Sodium GraphicsBootstrapper fired in place
    that:
      log:
        container: client
        tail: 100000
        matches: 'in-place GraphicsBootstrapper.*SodiumWorkarounds'
  - do: assert
    name: Sodium's inner mod was located in place (not copied into standard mods/)
    that:
      log:
        container: client
        tail: 100000
        matches: 'Running in-place candidate locator.*SodiumServiceModLocator'
  - do: assert
    name: a game-library copy was built so the inner mod resolves outer-jar classes in place
    that:
      log:
        container: client
        tail: 100000
        matches: 'Built game-library copy of'

topology:
  server:
    memory: 2G
    env:
      ENABLE_ROLLING_LOGS: "false"
    modrinth:
      version: "1.21.1"
      versionType: beta
      projects:
        - sodium

serverFiles:
  modpackName: amp-autotest
  marker: config/amp-autotest-marker.json
  expectedMods:
    - "*odium*"
