id: immediatewindow-forcecopy-offline
description: |
  Offline / client-only proof of the ONE remaining force-copy path on NeoForge
  (ModpackLoaderService.forceCopyServices = ImmediateWindowProvider): Simple Custom Early
  Loading ships ONLY META-INF/services/net.neoforged.neoforgespi.earlywindow.ImmediateWindowProvider
  (no mods.toml, no nested jars). NeoForge picks the early-window provider and creates the window
  in the same call, before and out of reach of anything AutoModpack can do from the modpack folder,
  so this jar must NOT load in place - it must be copied into standard mods/ by the workaround in
  ModpackUtils.correctFilesLocations.

  The plain client-only staging (updateSelectedModpackOnLaunch=false) deliberately skips file
  reconciliation, so this scenario stages a matching automodpack-content.json and re-enables
  update-on-launch: with no server reachable (and no stored secret) Preload falls back to the
  local content and runs the full apply path offline. First boot: the jar appears in standard
  mods/, AutoModpack requests a restart, and the client exits. Second boot: the
  copy is stable (no re-copy), Preload passes through, and the game launches normally with the
  jar as a native SERVICE-layer citizen of standard mods/.

  Does NOT assert the custom window renders: headless, and the provider is only selected when
  config/fml.toml names it (the harness pins earlyWindowControl=false anyway).

network: host
mode: client-only

timeouts:
  clientRunSeconds: 1200

targets:
  - 1.21.1-neoforge

flow:
  - do: stage_modpack
    name: stage Simple Custom Early Loading into the modpack folder (NOT standard mods/)
    config:
      updateSelectedModpackOnLaunch: true
    manifest: true
    mods:
      - url: https://cdn.modrinth.com/data/Bi8o4aLw/versions/G5bmC36h/SimpleCustomEarlyLoading-2.2-neoforge.jar
        sha512: 5fa2487129c5367c80528e196ad9b606a10067786852c01f5ab09fd1804d2dbde1b1e074c7ddb969b8503104b2b575ae42e74f9560e386e2942cbd0506958c71
  - do: launch_client
    name: first boot - the apply path must force-copy the jar to standard mods/
  - do: wait_for
    name: force-copy completed and AutoModpack asked for a restart
    timeout: 420s
    until:
      all:
        - file: mods/SimpleCustomEarlyLoading-2.2-neoforge.jar
        - log:
            container: client
            matches_all:
              - 'Restart required because: standard-directory mods were copied or updated'
              - 'Please restart the game to apply updates!'
  - do: wait_exit
    name: the restart request exits the client in headless preload
    expect: any
    timeout: 120s
  - do: assert
    name: the jar was never treated as an in-place early service (first boot)
    that:
      all:
        - log:
            container: client
            not_matches:
              - 'StackOverflowError'
        - log:
            # GraphicsBootstrapper/bridge lines are DEBUG-only bookkeeping now; check their
            # absence there (not stdout) so this stays a real proof, not a trivial pass.
            file: logs/debug.log
            not_matches:
              # This jar ships no actively-run service, so it can never be bootstrapped/bridged in
              # place; with it as the only staged mod, no in-place line may mention it at all.
              - 'GraphicsBootstrapper.*SimpleCustomEarlyLoading'
              - 'Bridged \d+ outer package.*SimpleCustomEarlyLoading'
  - do: launch_client
    name: second boot - the copied jar loads natively from standard mods/
  - do: wait_for
    name: Preload passes through (no re-copy) and ModLauncher launches the game
    timeout: 420s
    until:
      log:
        container: client
        matches_all:
          - 'AutoModpack prelaunched'
          - "Launching target 'forgeclient'"
  - use: finish_client_only
  - do: assert
    name: the copy is stable and the jar still never loads in place (second boot)
    that:
      all:
        - log:
            container: client
            not_matches:
              - 'StackOverflowError'
              - 'Applying workaround'
              - 'Please restart the game to apply updates!'
        - log:
            # GraphicsBootstrapper/bridge lines are DEBUG-only bookkeeping now; check their
            # absence there (not stdout) so this stays a real proof, not a trivial pass.
            file: logs/debug.log
            not_matches:
              - 'GraphicsBootstrapper.*SimpleCustomEarlyLoading'
              - 'Bridged \d+ outer package.*SimpleCustomEarlyLoading'

serverFiles:
  modpackName: amp-autotest
  marker: config/amp-autotest-marker.json
